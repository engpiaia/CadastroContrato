<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Print conceitual da central de ajuda">
  <defs><linearGradient id="h" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2c3e50"/><stop offset="1" stop-color="#4ca1af"/></linearGradient></defs><rect width="1200" height="760" fill="#dce6f1"/><rect width="1200" height="86" fill="url(#h)"/><text x="42" y="54" font-family="Segoe UI, Arial" font-size="30" font-weight="800" fill="#fff">Ajuda - CadastroContrato</text><text x="1030" y="54" font-family="Segoe UI, Arial" font-size="17" fill="#eaf6f8">Voltar</text><rect x="35" y="120" width="300" height="570" rx="12" fill="#fff"/><text x="60" y="158" font-family="Segoe UI, Arial" font-size="20" font-weight="800" fill="#2c3e50">Tópicos</text><rect x="60" y="180" width="250" height="42" rx="8" fill="#f8fafc" stroke="#cbd5e1"/><text x="80" y="207" font-family="Segoe UI, Arial" font-size="15" fill="#94a3b8">Pesquisar na ajuda...</text><g font-family="Segoe UI, Arial" font-size="16"><rect x="60" y="250" width="250" height="38" rx="8" fill="#eef3f8"/><text x="78" y="275" fill="#2c3e50" font-weight="800">Visão geral</text><text x="78" y="325" fill="#334155">Login</text><text x="78" y="375" fill="#334155">Tela principal e dashboard</text><text x="78" y="425" fill="#334155">Cadastro de parceiros</text><text x="78" y="475" fill="#334155">Cadastro de contratos</text><text x="78" y="525" fill="#334155">Cláusulas do contrato</text><text x="78" y="575" fill="#334155">Problemas comuns</text></g><rect x="370" y="120" width="795" height="570" rx="12" fill="#fff"/><text x="400" y="158" font-family="Segoe UI, Arial" font-size="20" font-weight="800" fill="#2c3e50">Conteúdo</text><line x1="400" y1="178" x2="1130" y2="178" stroke="#e2e8f0"/><text x="400" y="222" font-family="Segoe UI, Arial" font-size="24" font-weight="800" fill="#2c3e50">VISÃO GERAL DO CADASTROCONTRATO</text><g font-family="Segoe UI, Arial" font-size="18" fill="#334155"><text x="400" y="270">O Contratech organiza parceiros, contratos, cláusulas e usuários.</text><text x="400" y="320">Fluxo comum de uso:</text><text x="430" y="360">1. Entrar com e-mail e senha.</text><text x="430" y="400">2. Cadastrar parceiros.</text><text x="430" y="440">3. Cadastrar contratos vinculados aos parceiros.</text><text x="430" y="480">4. Registrar cláusulas de cada contrato.</text><text x="430" y="520">5. Acompanhar alertas e vencimentos no dashboard.</text><text x="400" y="590" fill="#4ca1af" font-weight="800">F1 abre ajuda contextual em qualquer tela.</text></g></svg>
